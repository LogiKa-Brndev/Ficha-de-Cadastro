<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8"/>
        <title>Cadastro de cliente</title>
    </head>

<body>

    <h2>Ficha de Cadastro</h2>
    <form>
        <fieldset>
            <legend>Cliente</legend>
            <label for="nomeC">Nome completo:</label>
            <br>
            <input type="text" id="nomeC" name="nomeC" required>
            <br>
            <br>
            <label for="cpf">CPF:</label>
            <br>
            <input type="text" id="cpf" name="cpf" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00">
            <br>
            <br>
            <label for="endereco">Endereço:</label>
            <br>
            <input type="text" id="endereco" name="endereco" placeholder="Rua, Cidade, Estado/UF">
            <br>
            <br>
            <label for="email">E-mail:</label>
            <br>
            <input type="text" id="email" name="email" required>
            <br>
            <br>
            <label for="tel">Telefone/Celular:</label>
            <br>
            <input type="text" id="tel" name="tel" pattern="\(\d{2}\)\s\d{4,5}-\{4}" placeholder="(00) 00000-0000">
        </fieldset>
    
    <fieldset>
        <legend>Dados do Veículo</legend>

        <label for="marca">Fabricante:</label>
        <br>
        <input type="texte" id="marca" name="marca" required>
        <br>
        <br>
        <label for="placa">Placa</label>
        <br>
        <input type="text" id="placa" name="placa">
        <br>
        <br>
        <table>
            <tr>
                <td>
                    <label for="uf">UF:</label>
                    <br>
                    <select id="uf" name="uf" required>
                        <option value="">--Selecione--</option>
                        <option value="sp">SP</option>
                    </select>
                </td>
                <td style="padding-left: 20px;">
                    <label for="cidade">Cidade:</label>
                    <br>
                    <select id="cidade" name="cidade" required>
                        <option value="">--Selecione--</option>
                        <option value="barueri">Barueri</option>
                        <option value="osasco">Osasco</option>
                        <option value="sao paulo">São Paulo</option>
                    </select>
                </td>
            </tr>
        </table>
        <br>
        <br>
        <label for="ano">Ano:</label>
        <br>
        <input type="text" id="ano" name="ano" pattern="\d{4}" placeholder="0000">
        <br>
        <br>
        <label for="cor">Cor:</label>
        <select id="cor" name="cor" required>
            <option value="">--Selecione a cor--</option>
            <option value="preto">Preto</option>
            <option value="branco">Branco</option>
            <option value="azul">Azul</option>
        </select>
        <br>
        <br>
        <label for="outracor">Outra cor?</label>
        <input type="color" id="outracor" name="outracor" value="#55af00">
        <br>
    </fieldset>

    <fieldset>
        <legend>Observações:</legend>
        <label for="observacoes">Observações do Veículo</label>
        <br>
        <textarea id="observacoes" name="observacoes" rows="5" cols="40" placeholder="Registro de riscos, batidas ou avarias detectadas"></textarea>
    </fieldset>
    <br>
    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
    </form>
</body>

</html>
